name: Build Paper
description: Build the thesis PDF in a pinned TeX Live environment and summarize serious build findings.

inputs:
  paper-dir:
    description: Paper directory to build.
    required: true
  root-file:
    description: Main TeX file.
    required: true
  pdf-file:
    description: Generated PDF file name.
    required: true
  artifact-name:
    description: GitHub artifact name.
    required: true
  artifact-file:
    description: PDF file name inside the artifact.
    required: true
  retention-days:
    description: Artifact retention period in days.
    required: true
  texlive-version:
    description: TeX Live version used for the build environment.
    required: true
  texlive-os:
    description: Base OS used for the TeX Live container image.
    required: true
  report-repo:
    description: Repository slug used for summary links.
    required: true
  report-sha:
    description: Commit SHA used for summary links.
    required: true

runs:
  using: composite
  steps:
    - name: Build PDF
      id: build_pdf
      continue-on-error: true
      uses: xu-cheng/texlive-action@v3
      with:
        texlive_version: ${{ inputs.texlive-version }}
        os: ${{ inputs.texlive-os }}
        run: |
          export PAPER_DIR='${{ inputs.paper-dir }}'
          export PAPER_ROOT_FILE='${{ inputs.root-file }}'
          bash .github/scripts/paper/build-paper.sh

    - name: Summarize build findings
      if: always()
      shell: bash
      env:
        PAPER_DIR: ${{ inputs.paper-dir }}
        PAPER_ROOT_FILE: ${{ inputs.root-file }}
        REPORT_REPO: ${{ inputs.report-repo }}
        REPORT_SHA: ${{ inputs.report-sha }}
      run: python3 .github/scripts/paper/summarize-build.py

    - name: Stage artifact
      shell: bash
      env:
        PAPER_DIR: ${{ inputs.paper-dir }}
        PAPER_PDF_FILE: ${{ inputs.pdf-file }}
        PAPER_ARTIFACT_FILE: ${{ inputs.artifact-file }}
      run: bash .github/scripts/paper/stage-artifact.sh

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: dist/${{ inputs.artifact-file }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error
