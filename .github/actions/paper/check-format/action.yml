name: Check LaTeX Formatting
description: Verify LaTeX formatting and report files that need to be reformatted.

inputs:
  paper-dir:
    description: Paper directory to scan.
    required: true
  wrap-length:
    description: Maximum line wrap length passed to tex-fmt.
    required: true
  rust-toolchain-version:
    description: Rust toolchain version used to install tex-fmt.
    required: true
  tex-fmt-version:
    description: tex-fmt version to install.
    required: true
  report-repo:
    description: Repository slug used for summary links.
    required: true
  report-sha:
    description: Commit SHA used for summary links.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-toolchain-version }}

    - name: Cache tex-fmt toolchain
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-paper-ci-cargo-tex-fmt-${{ inputs.tex-fmt-version }}

    - name: Install tex-fmt
      shell: bash
      env:
        TEX_FMT_VERSION: ${{ inputs.tex-fmt-version }}
      run: |
        set -euo pipefail

        if ! command -v tex-fmt >/dev/null 2>&1 || ! tex-fmt --version | grep -q " ${TEX_FMT_VERSION}$"; then
          cargo install --locked tex-fmt --version "${TEX_FMT_VERSION}" --force
        fi

    - name: Verify formatting
      shell: bash
      env:
        PAPER_DIR: ${{ inputs.paper-dir }}
        WRAP_LENGTH: ${{ inputs.wrap-length }}
        REPORT_REPO: ${{ inputs.report-repo }}
        REPORT_SHA: ${{ inputs.report-sha }}
      run: bash .github/scripts/paper/check-format.sh
