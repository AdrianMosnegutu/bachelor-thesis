name: Check LaTeX Lint
description: Run chktex and fail the job on any warning or error.

inputs:
  paper-dir:
    description: Paper directory to scan.
    required: true
  report-repo:
    description: Repository slug used for summary links.
    required: true
  report-sha:
    description: Commit SHA used for summary links.
    required: true

runs:
  using: composite
  steps:
    - name: Install chktex
      shell: bash
      run: |
        set -euo pipefail

        sudo apt-get update
        sudo apt-get install -y chktex

    - name: Run chktex
      shell: bash
      env:
        PAPER_DIR: ${{ inputs.paper-dir }}
        REPORT_REPO: ${{ inputs.report-repo }}
        REPORT_SHA: ${{ inputs.report-sha }}
      run: bash .github/scripts/paper/check-lint.sh
