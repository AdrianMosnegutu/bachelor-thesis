name: Check Spelling
description: Run codespell and summarize spelling issues as a linked table.

inputs:
  paper-dir:
    description: Paper directory to scan.
    required: true
  python-version:
    description: Python version used to install codespell.
    required: true
  codespell-version:
    description: codespell version to install.
    required: true
  report-repo:
    description: Repository slug used for summary links.
    required: true
  report-sha:
    description: Commit SHA used for summary links.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip downloads
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-paper-ci-pip-codespell-${{ inputs.codespell-version }}

    - name: Install codespell
      shell: bash
      env:
        CODESPELL_VERSION: ${{ inputs.codespell-version }}
      run: |
        set -euo pipefail

        python -m pip install --user "codespell==${CODESPELL_VERSION}"

    - name: Run codespell
      shell: bash
      env:
        PAPER_DIR: ${{ inputs.paper-dir }}
        REPORT_REPO: ${{ inputs.report-repo }}
        REPORT_SHA: ${{ inputs.report-sha }}
      run: bash .github/scripts/paper/check-spelling.sh
