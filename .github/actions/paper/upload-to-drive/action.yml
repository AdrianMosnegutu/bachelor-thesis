name: Upload Paper To Google Drive
description: Download the paper artifact and upload it to Google Drive.

inputs:
  artifact-name:
    description: GitHub artifact name to download.
    required: true
  artifact-file:
    description: PDF file name inside the artifact.
    required: true
  gcp-workload-identity-provider:
    description: Google Cloud Workload Identity Provider resource name.
    required: true
  gcp-service-account:
    description: Google Cloud service account email used for the upload.
    required: true
  gdrive-folder-id:
    description: Destination Google Drive folder id.
    required: true

runs:
  using: composite
  steps:
    - name: Download artifact
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.artifact-name }}
        path: dist

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account }}
        token_format: access_token
        access_token_scopes: https://www.googleapis.com/auth/drive

    - name: Upload to Google Drive
      shell: bash
      env:
        GCP_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        PAPER_ARTIFACT_FILE: ${{ inputs.artifact-file }}
        GDRIVE_FOLDER_ID: ${{ inputs.gdrive-folder-id }}
      run: bash .github/scripts/paper/upload-to-drive.sh
