name: Paper CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "paper/**"
      - "!paper/notes/**"
      - "!paper/scripts/**"
      - ".github/workflows/paper.yml"
      - ".github/actions/paper/**"
      - ".github/scripts/paper/**"
  pull_request:
    branches:
      - main
    paths:
      - "paper/**"
      - "!paper/notes/**"
      - "!paper/scripts/**"
      - ".github/workflows/paper.yml"
      - ".github/actions/paper/**"
      - ".github/scripts/paper/**"

permissions:
  contents: read

concurrency:
  group: paper-ci-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  PAPER_DIR: paper
  PAPER_ROOT_FILE: paper.tex
  PAPER_PDF_FILE: paper.pdf
  PAPER_ARTIFACT_NAME: thesis-paper
  PAPER_ARTIFACT_FILE: Design and Implementation of a Domain-Specific Language for Music Composition.pdf
  PAPER_WRAP_LENGTH: "120"
  PAPER_ARTIFACT_RETENTION_DAYS: "30"

  TEXLIVE_VERSION: "2024"
  TEXLIVE_OS: "debian"
  RUST_TOOLCHAIN_VERSION: "1.85.0"
  TEX_FMT_VERSION: "0.5.6"
  PYTHON_VERSION: "3.12"
  CODESPELL_VERSION: "2.3.0"
  RCLONE_RELEASE_VERSION: "1.68.2"

jobs:
  format-check:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check LaTeX formatting
        uses: ./.github/actions/paper/check-format
        with:
          paper-dir: ${{ env.PAPER_DIR }}
          wrap-length: ${{ env.PAPER_WRAP_LENGTH }}
          rust-toolchain-version: ${{ env.RUST_TOOLCHAIN_VERSION }}
          tex-fmt-version: ${{ env.TEX_FMT_VERSION }}
          report-repo: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          report-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

  lint-check:
    name: Check Code Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check LaTeX linting
        uses: ./.github/actions/paper/check-lint
        with:
          paper-dir: ${{ env.PAPER_DIR }}
          report-repo: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          report-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

  spell-check:
    name: Check Spelling
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check spelling
        uses: ./.github/actions/paper/check-spelling
        with:
          paper-dir: ${{ env.PAPER_DIR }}
          python-version: ${{ env.PYTHON_VERSION }}
          codespell-version: ${{ env.CODESPELL_VERSION }}
          report-repo: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          report-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

  build-paper:
    name: Build Paper
    runs-on: ubuntu-latest
    needs:
      - format-check
      - lint-check
      - spell-check
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build paper and upload artifact
        uses: ./.github/actions/paper/build-paper
        with:
          paper-dir: ${{ env.PAPER_DIR }}
          root-file: ${{ env.PAPER_ROOT_FILE }}
          pdf-file: ${{ env.PAPER_PDF_FILE }}
          artifact-name: ${{ env.PAPER_ARTIFACT_NAME }}
          artifact-file: ${{ env.PAPER_ARTIFACT_FILE }}
          retention-days: ${{ env.PAPER_ARTIFACT_RETENTION_DAYS }}
          texlive-version: ${{ env.TEXLIVE_VERSION }}
          texlive-os: ${{ env.TEXLIVE_OS }}
          report-repo: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          report-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

  deploy-paper:
    name: Deploy Paper to Google Drive
    runs-on: ubuntu-latest
    needs:
      - build-paper
    if: github.event_name != 'pull_request' && github.ref_name == 'main'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload artifact to Google Drive
        uses: ./.github/actions/paper/upload-to-drive
        with:
          artifact-name: ${{ env.PAPER_ARTIFACT_NAME }}
          artifact-file: ${{ env.PAPER_ARTIFACT_FILE }}
          rclone-version: ${{ env.RCLONE_RELEASE_VERSION }}
          gdrive-client-id: ${{ secrets.GDRIVE_CLIENT_ID }}
          gdrive-client-secret: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          gdrive-token: ${{ secrets.GDRIVE_TOKEN }}
          gdrive-folder-id: ${{ vars.GDRIVE_FOLDER_ID }}
