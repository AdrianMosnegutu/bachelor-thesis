name: Paper CI

on:
  workflow_dispatch:
  push:
    paths:
      - "paper/**"
      - ".github/workflows/paper.yml"
  pull_request:
    paths:
      - "paper/**"
      - ".github/workflows/paper.yml"

permissions:
  contents: read

concurrency:
  group: paper-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (tex-fmt)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo downloads and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-paper-ci-cargo-tex-fmt-v1

      - name: Install formatting tools
        run: |
          if ! command -v tex-fmt >/dev/null 2>&1; then
            cargo install --locked tex-fmt
          fi

      - name: Verify LaTeX formatting
        working-directory: paper
        run: tex-fmt --check --recursive -l 100

  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y chktex
          python3 -m pip install --user codespell

      - name: Check spelling
        run: |
          find paper -type f \( -name "*.tex" -o -name "*.bib" -o -name "*.sty" \) -print0 \
            | xargs -0 ~/.local/bin/codespell

      - name: Lint LaTeX (chktex)
        run: |
          find paper -type f \( -name "*.tex" -o -name "*.sty" \) -print0 \
            | xargs -0 chktex -q

  build-paper:
    name: Build PDF
    runs-on: ubuntu-latest
    needs:
      - format-check
      - lint-check
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: paper
          root_file: main.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: paper/main.pdf
          if-no-files-found: error
