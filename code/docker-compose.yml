services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: "3001"
      COMPILER_BIN: /usr/local/bin/dslrc

  client:
    build:
      context: client
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - server

  nginx:
    build:
      context: nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - client
      - server
